<section class="page">
  <header class="page-header">
    <h1>Register Patient (OPD/IPD Dashboard)</h1>
    <p>This page now links directly to OPD and IPD registers and shows counts.</p>
  </header>

  <section class="info-box">
    <p>OPD entries: <strong>{{ opdCount }}</strong></p>
    <p>IPD entries: <strong>{{ ipdCount }}</strong></p>
    <p>Last refreshed: <strong>{{ lastUpdated }}</strong></p>
    <button type="button" (click)="refreshCounts()">Refresh counts</button>
  </section>

  <section class="link-box">
    <a class="btn" routerLink="/opd">Go to OPD Register</a>
    <a class="btn btn-secondary" routerLink="/ipd">Go to IPD Register</a>
  </section>
</section>
