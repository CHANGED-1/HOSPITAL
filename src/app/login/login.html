<div class="login-container">
  <header class="app-header">
    <div class="header-content">
      <h1 class="app-title">BUGEMBE HCIV</h1>
      <p class="app-subtitle">Patient Record Management</p>
    </div>
  </header>

  <section class="login-page">
    <div class="login-card">
      <div class="card-header">
        <h2>Welcome Back</h2>
        <p>Sign in to your account</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        
        <div class="error-message" *ngIf="errorMessage">
          <p class="message">{{ errorMessage }}</p>
        </div>

        <div class="field">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <input id="username" type="text" formControlName="username" autocomplete="username" placeholder="Enter your username" />
          </div>
          <small class="error" *ngIf="form.get('username')?.touched && form.get('username')?.invalid">
            Username is required
          </small>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input id="password" type="password" formControlName="password" autocomplete="current-password" placeholder="Enter your password" />
          </div>
          <small class="error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
            Password is required
          </small>
        </div>

        <button type="submit" class="login-btn">Log In</button>

        <div class="hint">
          <strong>Demo Credentials:</strong><br>
          admin / admin | doctor / doctor | nurse / nurse
        </div>
      </form>
    </div>
  </section>
</div>
