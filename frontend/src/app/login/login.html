<div class="login-container">


  <section class="login-page">
    <div class="login-card">
      <div class="card-header">
        <h2>Welcome Back</h2>
        <p>Sign in to your account</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

        <div class="error-message" *ngIf="errorMessage" role="alert" aria-live="polite">
          <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <p class="message">{{ errorMessage }}</p>
        </div>

        <div class="field">
          <label for="username">Username</label>
          <div class="input-wrapper" [class.input-error]="form.get('username')?.touched && form.get('username')?.invalid">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <input
              id="username"
              type="text"
              formControlName="username"
              autocomplete="username"
              placeholder="Enter your username"
              [attr.aria-invalid]="form.get('username')?.touched && form.get('username')?.invalid"
              aria-describedby="username-error"
            />
          </div>
          <small
            id="username-error"
            class="error"
            *ngIf="form.get('username')?.touched && form.get('username')?.invalid"
            role="alert"
          >
            Username is required
          </small>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrapper" [class.input-error]="form.get('password')?.touched && form.get('password')?.invalid">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              autocomplete="current-password"
              placeholder="Enter your password"
              [attr.aria-invalid]="form.get('password')?.touched && form.get('password')?.invalid"
              aria-describedby="password-error"
            />
            <button
              type="button"
              class="toggle-password"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
            >
              <!-- Eye icon (password hidden) -->
              <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <!-- Eye-off icon (password visible) -->
              <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <small
            id="password-error"
            class="error"
            *ngIf="form.get('password')?.touched && form.get('password')?.invalid"
            role="alert"
          >
            Password is required
          </small>
        </div>

        <button type="submit" class="login-btn" [disabled]="isLoading" [class.loading]="isLoading">
          <span class="btn-spinner" *ngIf="isLoading" aria-hidden="true"></span>
          <span class="btn-text">{{ isLoading ? 'Signing in...' : 'Log In' }}</span>
        </button>

      </form>
    </div>
  </section>
</div>
